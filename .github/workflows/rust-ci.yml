name: Rust CI

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust_target:
          - x86_64-unknown-linux-gnu  # Linux
          - x86_64-apple-darwin       # macOS Intel
          - aarch64-apple-darwin      # macOS Apple Silicon
          - x86_64-pc-windows-msvc    # Windows

        # Filter out invalid combinations
        exclude:
          - os: ubuntu-latest
            rust_target: x86_64-apple-darwin
          - os: ubuntu-latest
            rust_target: aarch64-apple-darwin
          - os: ubuntu-latest
            rust_target: x86_64-pc-windows-msvc
          - os: macos-latest
            rust_target: x86_64-unknown-linux-gnu
          - os: macos-latest
            rust_target: x86_64-pc-windows-msvc
          - os: windows-latest
            rust_target: x86_64-unknown-linux-gnu
          - os: windows-latest
            rust_target: x86_64-apple-darwin
          - os: windows-latest
            rust_target: aarch64-apple-darwin

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.rust_target }}
        override: true

    - name: Cache Cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build
      run: cargo build --verbose --release --target ${{ matrix.rust_target }}

    - name: Run tests
      run: cargo test --verbose --target ${{ matrix.rust_target }}
      # Some targets might not support running tests directly on the runner,
      # or might require specific setup. Adjust as needed.
      # For example, cross-compiling for embedded systems might not run tests.
      continue-on-error: true # Allow build to pass even if tests fail on some platforms

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: gitter-rs-${{ matrix.rust_target }}
        path: target/${{ matrix.rust_target }}/release/gitter-rs${{ contains(matrix.rust_target, 'windows') && '.exe' || '' }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release assets
        run: |
          mkdir release_assets
          for dir in artifacts/*; do
            target_name=$(basename "$dir")
            # Assuming the executable is directly inside the artifact directory
            # and named 'gitter-rs' or 'gitter-rs.exe'
            if [ -f "$dir/gitter-rs" ]; then
              zip -j release_assets/${target_name}.zip "$dir/gitter-rs"
            elif [ -f "$dir/gitter-rs.exe" ]; then
              zip -j release_assets/${target_name}.zip "$dir/gitter-rs.exe"
            else
              echo "Warning: No executable found in $dir"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*.zip
          generate_release_notes: true