name: Rust CI

on:
  push:
    tags:
      # 1. Standard Production Releases (e.g., 0.0.1, 12.33.9)
      - '[0-9]+.[0-9]+.[0-9]+'


      # 2. Strict Dotted Pre-releases (e.g., 1.1.1.a.1, 1.1.1.b.1201, 1.1.1.rc.3)
      - '[0-9]+.[0-9]+.[0-9]+.a.[0-9]*'
      - '[0-9]+.[0-9]+.[0-9]+.b.[0-9]*'
      - '[0-9]+.[0-9]+.[0-9]+.rc.[0-9]*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.rust_target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux Targets
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu  # Linux Intel
          - os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu # Linux ARM

          # macOS Targets
          - os: macos-latest
            rust_target: x86_64-apple-darwin       # Mac Intel
          - os: macos-latest
            rust_target: aarch64-apple-darwin      # Mac Silicon

          # Windows Targets
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc    # Windows Intel
          - os: windows-latest
            rust_target: aarch64-pc-windows-msvc   # Windows ARM

    steps:
      - uses: actions/checkout@v4

      # 1. Host Setup: Install Linux ARM Cross-Linker
      - name: Install ARM GCC for Linux
        if: matrix.rust_target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      # 2. Host Setup: Install Windows ARM Build Tools
      - name: Install Windows ARM64 Build Tools
        if: matrix.rust_target == 'aarch64-pc-windows-msvc'
        shell: powershell
        run: |
          Start-Process "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" -ArgumentList "modify --installPath ""C:\Program Files\Microsoft Visual Studio\2022\Enterprise"" --add Microsoft.VisualStudio.Component.VC.Tools.ARM64 --passive --norestart" -Wait

      # 3. Setup Rust Toolchain
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      # 4. Smart Cache Configuration
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust_target }}

      # 5. Build Binary (with target-specific environment linkers)
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --verbose --release --target ${{ matrix.rust_target }}

      # 6. Smart Test Suite execution (skips cross-compiled ARM targets that cannot run on host runner)
      # Skip tests
      # - name: Run tests
      #   if: "!contains(matrix.rust_target, 'aarch64')"
      #   run: cargo test --verbose --target ${{ matrix.rust_target }}

      # 7. Upload to Pipeline Stage Artifacts
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitter-${{ matrix.rust_target }}
          path: target/${{ matrix.rust_target }}/release/gitter${{ contains(matrix.rust_target, 'windows') && '.exe' || '' }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release assets
        run: |
          mkdir release_assets
          for dir in artifacts/*; do
            target_name=$(basename "$dir")
            if [ -f "$dir/gitter" ]; then
              zip -9 -j "release_assets/${target_name}.zip" "$dir/gitter"
            elif [ -f "$dir/gitter.exe" ]; then
              zip -9 -j "release_assets/${target_name}.zip" "$dir/gitter.exe"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*.zip
          generate_release_notes: true